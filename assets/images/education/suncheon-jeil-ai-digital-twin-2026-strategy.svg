      <text x="52" y="64" text-anchor="middle" font-size="28" font-weight="900" fill="#fff">4</text>
      <text x="32" y="112" font-size="28" font-weight="800" fill="#111827">지역산업</text>
      <text x="32" y="153" font-size="20" fill="#475569">제철·안전·보건</text>
      <text x="32" y="183" font-size="20" fill="#475569">현장실습·취업</text>
      <text x="32" y="213" font-size="20" fill="#475569">RISE 연결</text>
    </g>
