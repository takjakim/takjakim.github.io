  <path d="M303 310 C326 310 326 310 350 310" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M583 310 C606 310 606 310 630 310" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M863 310 C886 310 886 310 910 310" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" fill="none"/>
  <rect x="250" y="488" width="700" height="70" rx="26" fill="#0f172a" opacity="0.92"/>
  <text x="600" y="532" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="25" font-weight="800" fill="#fff">핵심 질문: 기술 인프라가 실제 교과·실습·취업경로로 연결되는가?</text>
