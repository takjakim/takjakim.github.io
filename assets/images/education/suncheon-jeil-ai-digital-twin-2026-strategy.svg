<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">순천제일대학교 AI·디지털 트윈 전략 해석 도식</title>
  <desc id="desc">AI 리터러시, 디지털 트윈 실습, 하이플렉스, 지역산업 연계를 학생 진로와 대학 전략으로 연결한 도식</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf2f8"/>
      <stop offset="0.55" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <text x="70" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="34" font-weight="800" fill="#0f172a">대학컨설팅 관점의 4단계 해석</text>
  <text x="70" y="124" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="22" fill="#475569">순천제일대 사례는 기술 도입보다 교육과정·지역산업·학습자 접근성의 결합으로 읽어야 한다.</text>
  <g filter="url(#shadow)" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
    <g transform="translate(70,185)">
      <rect width="235" height="250" rx="24" fill="#ffffff"/>
      <circle cx="52" cy="54" r="30" fill="#ec4899"/>
      <text x="52" y="64" text-anchor="middle" font-size="28" font-weight="900" fill="#fff">1</text>
      <text x="32" y="112" font-size="28" font-weight="800" fill="#111827">AI 리터러시</text>
      <text x="32" y="153" font-size="20" fill="#475569">신입생 공통 역량</text>
      <text x="32" y="183" font-size="20" fill="#475569">교직원 활용 역량</text>
      <text x="32" y="213" font-size="20" fill="#475569">수업·상담 적용</text>
    </g>
    <g transform="translate(350,185)">
      <rect width="235" height="250" rx="24" fill="#ffffff"/>
      <circle cx="52" cy="54" r="30" fill="#2563eb"/>
      <text x="52" y="64" text-anchor="middle" font-size="28" font-weight="900" fill="#fff">2</text>
      <text x="32" y="112" font-size="28" font-weight="800" fill="#111827">디지털 트윈</text>
      <text x="32" y="153" font-size="20" fill="#475569">실습공간 가상화</text>
      <text x="32" y="183" font-size="20" fill="#475569">반복·원격 학습</text>
      <text x="32" y="213" font-size="20" fill="#475569">직업교육 DX</text>
    </g>
    <g transform="translate(630,185)">
      <rect width="235" height="250" rx="24" fill="#ffffff"/>
      <circle cx="52" cy="54" r="30" fill="#0891b2"/>
      <text x="52" y="64" text-anchor="middle" font-size="28" font-weight="900" fill="#fff">3</text>
      <text x="32" y="112" font-size="28" font-weight="800" fill="#111827">하이플렉스</text>
      <text x="32" y="153" font-size="20" fill="#475569">재직자·성인학습자</text>
      <text x="32" y="183" font-size="20" fill="#475569">시간·거리 장벽 완화</text>
      <text x="32" y="213" font-size="20" fill="#475569">평생직업교육</text>
    </g>
    <g transform="translate(910,185)">
