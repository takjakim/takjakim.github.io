<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">순천향대 G-LAMP 연구거점 전략 도식</title>
  <desc id="desc">G-LAMP를 연구소 운영, 공동연구, 인력양성, 지역 바이오 연계로 해석한 대학컨설팅 전략 도식</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1f2a44" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font:800 44px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#102033}
      .sub{font:600 24px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#486174}
      .label{font:800 28px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#132238}
      .body{font:600 20px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#42566b}
      .small{font:700 18px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1020" cy="80" r="180" fill="#dbeafe" opacity="0.7"/>
  <circle cx="110" cy="610" r="150" fill="#fce7f3" opacity="0.72"/>
  <text x="70" y="86" class="title">G-LAMP를 대학전략으로 읽는 네 개의 축</text>
  <text x="72" y="124" class="sub">연구비 확보가 아니라 “연구 운영체계와 인재 경로”가 핵심이다</text>

  <g filter="url(#shadow)">
    <rect x="430" y="205" width="340" height="220" rx="32" fill="#111827"/>
    <text x="600" y="272" text-anchor="middle" style="font:900 40px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#fff">순천향대</text>
    <text x="600" y="326" text-anchor="middle" style="font:900 52px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#f9a8d4">G-LAMP</text>
    <text x="600" y="374" text-anchor="middle" style="font:700 24px -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;fill:#dbeafe">분자대사 · 기초과학 · 융합연구</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="185" width="305" height="150" rx="26" fill="#ffffff"/>
    <text x="100" y="235" class="label">① 연구소 운영</text>
    <text x="100" y="275" class="body">연구조직 관리체계</text>
    <text x="100" y="305" class="body">성과책임·차등지원</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="825" y="185" width="305" height="150" rx="26" fill="#ffffff"/>
    <text x="855" y="235" class="label">② 공동연구</text>
    <text x="855" y="275" class="body">ORBIT 협력 궤도</text>
    <text x="855" y="305" class="body">학제·기관 간 연결</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="420" width="305" height="150" rx="26" fill="#ffffff"/>
    <text x="100" y="470" class="label">③ 인력양성</text>
    <text x="100" y="510" class="body">학부-대학원-포닥</text>
    <text x="100" y="540" class="body">Lab-Connect·오픈랩</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="825" y="420" width="305" height="150" rx="26" fill="#ffffff"/>
    <text x="855" y="470" class="label">④ 지역·산업</text>
    <text x="855" y="510" class="body">AI의료·바이오 융합</text>
    <text x="855" y="540" class="body">충남·아산 전략 연결</text>
  </g>

  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" opacity="0.8">
    <path d="M375 260 C420 260 420 260 430 260"/>
    <path d="M770 260 C815 260 815 260 825 260"/>
    <path d="M375 495 C420 495 420 392 430 382"/>
    <path d="M770 382 C815 392 815 495 825 495"/>
  </g>
  <text x="70" y="635" class="small">도식: 공식 G-LAMP 사업단 공개자료와 보도자료를 바탕으로 필자가 대학컨설팅 관점에서 재구성</text>
</svg>
