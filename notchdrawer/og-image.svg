<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060c"/><stop offset="1" stop-color="#000004"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0a4bd0" stop-opacity=".55"/><stop offset="1" stop-color="#0a4bd0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0b6fb8" stop-opacity=".45"/><stop offset="1" stop-color="#0b6fb8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33333e"/><stop offset="1" stop-color="#1a1a22"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#9cc4ff"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="26"/></filter>
    <filter id="ds" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".7"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="330" cy="150" rx="520" ry="420" fill="url(#glow)" filter="url(#soft)"/>
  <ellipse cx="1050" cy="560" rx="420" ry="360" fill="url(#glow2)" filter="url(#soft)"/>

  <!-- left: text -->
  <g font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif">
    <text x="92" y="150" font-family="ui-monospace,'SF Mono',monospace" font-size="24" letter-spacing="8" fill="#5AC8FA" font-weight="600">MACOS · NOTCH UTILITY</text>
    <text x="88" y="270" font-size="104" font-weight="700" letter-spacing="-4" fill="#ffffff">NotchDrawer</text>
    <text x="92" y="352" font-size="42" font-weight="600" letter-spacing="-1" fill="#e6e6ea">Reclaim the icons</text>
    <text x="92" y="406" font-size="42" font-weight="600" letter-spacing="-1" fill="url(#head)">your notch hides.</text>

    <!-- price pill -->
    <g transform="translate(92,470)">
      <rect width="300" height="58" rx="29" fill="rgba(10,132,255,0.14)" stroke="#0A84FF" stroke-width="1.5"/>
      <text x="150" y="38" text-anchor="middle" font-size="24" font-weight="600" fill="#8fc6ff">$5 · Lifetime · No sub</text>
    </g>
    <text x="92" y="588" font-family="ui-monospace,'SF Mono',monospace" font-size="20" fill="#6e6e78">takjakim.kr/notchdrawer</text>
  </g>

  <!-- right: device mockup -->
  <g transform="translate(720,150)">
    <!-- screen -->
    <rect x="0" y="0" width="420" height="300" rx="22" fill="#111119" stroke="rgba(255,255,255,.08)"/>
    <!-- menubar -->
    <rect x="0" y="0" width="420" height="34" rx="22" fill="rgba(0,0,0,.45)"/>
    <rect x="0" y="22" width="420" height="12" fill="rgba(0,0,0,.45)"/>
    <circle cx="26" cy="17" r="5" fill="#fff" opacity=".8"/>
    <rect x="42" y="13" width="30" height="7" rx="3.5" fill="#fff" opacity=".45"/>
    <g fill="#fff" opacity=".8"><circle cx="300" cy="17" r="5"/><circle cx="330" cy="17" r="5"/><circle cx="360" cy="17" r="5"/><circle cx="390" cy="17" r="5"/></g>
    <!-- notch -->
    <rect x="160" y="0" width="100" height="26" rx="13" fill="#000"/>
    <!-- hidden dots -->
    <g fill="#0A84FF"><circle cx="186" cy="13" r="4"/><circle cx="210" cy="13" r="4"/><circle cx="234" cy="13" r="4"/></g>
    <!-- link -->
    <path d="M210 34 V64" stroke="#0A84FF" stroke-width="2" stroke-dasharray="3 4" opacity=".7"/>
    <!-- drawer -->
    <g filter="url(#ds)">
      <rect x="95" y="64" width="230" height="72" rx="20" fill="url(#tray)" stroke="#0A84FF" stroke-width="1.5"/>
    </g>
    <g>
      <rect x="118" y="86" width="30" height="30" rx="8" fill="#0A84FF"/>
      <rect x="158" y="86" width="30" height="30" rx="8" fill="#34C759"/>
      <rect x="198" y="86" width="30" height="30" rx="8" fill="#FF9F0A"/>
      <rect x="238" y="86" width="30" height="30" rx="8" fill="#FF375F"/>
      <rect x="278" y="86" width="30" height="30" rx="8" fill="rgba(255,255,255,.14)"/>
      <text x="293" y="107" text-anchor="middle" font-size="20" fill="#fff" opacity=".7">+</text>
    </g>
  </g>
</svg>
